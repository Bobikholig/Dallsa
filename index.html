<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>LSPD Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">

  <h1>LSPD | Promotion Report</h1>

  <form id="reportForm">

    <div class="box">
      <label>Ник</label>
      <input type="text" id="nick" required>
    </div>

    <div class="box">
      <label>Static ID</label>
      <input type="text" id="staticId" required>
    </div>

    <div class="box">
      <label>Подразделение</label>
      <select id="dept">
        <option>CPD</option>
        <option>DB</option>
        <option>PAI</option>
        <option>PA</option>
        <option>IAD</option>
      </select>
    </div>

    <div class="box">
      <label>Ссылка на скрины</label>
      <input type="url" id="link" required>
    </div>

    <button type="submit">Отправить</button>

  </form>

  <p id="status"></p>

</div>

<script src="script.js"></script>
</body>
</html>
